<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Menu</title>
    <style>
        .game-column {
            display: flex;
            flex-direction: column; 
            width: 220px;           
            background-color: #2c3e50;
            padding: 15px;
            border-radius: 8px;
            margin: 20px auto;      
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Styling for all buttons */
        .game-column a {
            color: white;
            text-decoration: none;
            padding: 15px;
            margin-bottom: 8px;    
            background-color: #34495e;
            text-align: center;
            font-family: sans-serif;
            font-weight: bold;
            border-radius: 4px;
            transition: 0.2s;
        }

        /* Hover effect for game buttons */
        .game-column a:hover {
            background-color: #3498db;
        }

        /* Specific styling for the BACK button */
        .game-column a.back-btn {
            background-color: #e74c3c; /* Red color */
            margin-top: 15px;          /* Extra space above it */
            border-top: 2px solid #c0392b;
        }

        .game-column a.back-btn:hover {
            background-color: #c0392b;
        }

        .title {
            text-align: center;
            font-family: sans-serif;
            font-size: 28px;
            font-weight: bold;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="title">thename</div>

    <div class="game-column">
        <a href="index3.html">the game 1</a>
        <a href="index4.html">the game 2</a>
        <a href="index5.html">the game 3</a>
        <a href="index6.html">the game 4</a>
        <a href="index7.html">the game 5</a>
        <a href="index8.html">the game 6</a>
        <a href="index9.html">the game 7</a>


        <a href="index.html" class="back-btn">BACK</a>
    </div>

</body>
</html>
