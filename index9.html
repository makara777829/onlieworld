<!DOCTYPE html>
<html>
<head>
    <title>Tic-Tac-100: Pro Grid</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.6.14/vue.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/2.1.3/TweenMax.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css?family=Permanent+Marker');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: 'Permanent Marker', cursive; }

        #app {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #16213e, #0f3460);
            color: white;
        }

        .header {
            position: absolute;
            top: 10px;
            text-align: center;
            z-index: 10;
        }

        .btn-home {
            display: inline-block;
            padding: 6px 15px;
            border: 2px solid #e94560;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 10px;
            margin-bottom: 5px;
            background: rgba(233, 69, 96, 0.2);
        }

        .turn-indicator {
            font-size: 12px;
            letter-spacing: 1px;
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 20px;
        }

        /* 10 columns x 10 rows grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(10, 34px); /* Smaller size to fit phone */
            grid-template-rows: repeat(10, 34px);
            gap: 3px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px;
            border-radius: 8px;
            border: 3px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .cell {
            width: 34px;
            height: 34px;
            background: #0f3460;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 3px;
        }

        .cell-text {
            font-size: 22px;
            pointer-events: none;
        }

        .p-x { color: #e94560; text-shadow: 0 0 5px #e94560; }
        .p-o { color: #4ecca3; text-shadow: 0 0 5px #4ecca3; }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
        }

        .overlay h2 { font-size: 36px; text-align: center; margin-bottom: 20px; }

        .btn-restart {
            padding: 12px 30px;
            font-family: inherit;
            font-size: 18px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 0 #9e1a32;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <a href="index2.html" class="btn-home">← HOME</a>
        <div class="turn-indicator">
            TURN: <span :class="myTurn ? 'p-x' : 'p-o'">{{ myTurn ? 'X' : 'O' }}</span> | 5 IN A ROW
        </div>
    </div>

    <div class="game-grid">
        <div v-for="(block, index) in grid" 
             :key="index" 
             class="cell" 
             @click="select(index)">
            <transition v-on:enter="enterSymbol" v-bind:css="false">
                <span v-if="block.figure !== -1" 
                      :class="['cell-text', block.figure === 1 ? 'p-x' : 'p-o']">
                    {{ block.figure === 1 ? 'X' : 'O' }}
                </span>
            </transition>
        </div>
    </div>

    <transition v-on:enter="enterWin" v-bind:css="false">
        <div v-if="winner" class="overlay">
            <h2 :class="winColorClass">{{ winnerText }}</h2>
            <button class="btn-restart" @click="restart">PLAY AGAIN</button>
        </div>
    </transition>
</div>

<script>
new Vue({
    el: '#app',
    data() {
        return {
            rows: 10,
            cols: 10,
            grid: [],
            myTurn: false,
            winner: false,
            winnerText: '',
            winColorClass: ''
        }
    },
    created() {
        this.init();
    },
    methods: {
        init() {
            this.grid = _.range(100).map(i => ({ index: i, figure: -1 }));
            this.winner = false;
        },
        select(index) {
            if (this.grid[index].figure !== -1 || this.winner) return;

            const player = this.myTurn ? 1 : 0;
            this.grid[index].figure = player;

            if (this.checkWin(index, player)) {
                this.winner = true;
                this.winnerText = (player === 1 ? 'X' : 'O') + ' WINS!';
                this.winColorClass = player === 1 ? 'p-x' : 'p-o';
            } else if (_.every(this.grid, b => b.figure !== -1)) {
                this.winner = true;
                this.winnerText = "DRAW!";
                this.winColorClass = '';
            } else {
                this.myTurn = !this.myTurn;
            }
        },
        checkWin(idx, p) {
            const r = Math.floor(idx / this.cols);
            const c = idx % this.cols;
            const directions = [[0,1],[1,0],[1,1],[1,-1]];
            
            for (let [dr, dc] of directions) {
                let count = 1;
                for (let i=1; i<5; i++) if (this.isMatch(r+dr*i, c+dc*i, p)) count++; else break;
                for (let i=1; i<5; i++) if (this.isMatch(r-dr*i, c-dc*i, p)) count++; else break;
                if (count >= 5) return true;
            }
            return false;
        },
        isMatch(r, c, p) {
            if (r < 0 || r >= this.rows || c < 0 || c >= this.cols) return false;
            return this.grid[r * this.cols + c].figure === p;
        },
        restart() {
            this.init();
            this.myTurn = false;
        },
        enterSymbol(el, done) {
            TweenMax.from(el, 0.4, { autoAlpha: 0, scale: 0, ease: Back.easeOut, onComplete: done });
        },
        enterWin(el) {
            TweenMax.from(el, 0.5, { autoAlpha: 0 });
            TweenMax.from(el.querySelector('h2'), 0.8, { scale: 0, rotation: -10, ease: Elastic.easeOut });
        }
    }
});
</script>
</body>
</html>
