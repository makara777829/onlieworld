<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Elite Gallery | Vertex Titanium</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style> 
        /* --- RESPONSIVE OVERRIDES --- */
        @media (max-width: 400px) {
            #mainSidebar { width: calc(100% - 40px) !important; left: 20px; top: 10px; }
            #actionGroup { top: auto; bottom: 20px; left: 20px; right: 20px; justify-content: center; }
            .tool-grid { grid-template-columns: repeat(4, 1fr); }
        }

        @media (max-width: 500px) { .sidebar { width: 85%; } }

        @media (max-width: 480px) {
            .msg { max-width: 95%; }
            .bubble { padding: 8px; font-size: 14px; }
            .footer { gap: 4px; padding: 8px; }
            .footer button { padding: 8px 4px; font-size: 8px; }
        }

        header { padding-top: calc(12px + env(safe-area-inset-top)); }

        :root {
            --paint-accent: #ff4757; 
            --vertex-accent: #00f2ff;
            --game-accent: #ffa502;
            --ui-panel: rgba(25, 25, 35, 0.98);
            --sidebar-bg: #1e2229;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: linear-gradient(rgba(241, 242, 246, 0.8), rgba(241, 242, 246, 0.8)), 
                        url('https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?q=80&w=2745&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #2f3542; font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; position: fixed; width: 100%; 
        }

        /* --- VERTEX STUDIO --- */
        #paint-studio { position: fixed; inset: 0; background: #0a0a0c; z-index: 9000; display: none; flex-direction: column; }
        #paint-studio.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #vertexCanvas { position: absolute; top: 0; left: 0; cursor: crosshair; touch-action: none; background: #0a0a0c; }
        .bg-pro-dark { background-image: radial-gradient(circle, #1a1a20 1px, transparent 1px); background-size: 30px 30px; }
        
        .vertex-ui { position: fixed; inset: 0; pointer-events: none; z-index: 9001; padding: 20px; color: white; }
        .ui-panel { pointer-events: auto; background: var(--ui-panel); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; backdrop-filter: blur(12px); }
        #mainSidebar { width: 260px; position: absolute; left: 20px; top: 20px; }
        .ui-header { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; }
        .ui-title { font-size: 10px; font-weight: 900; color: var(--vertex-accent); letter-spacing: 2px; }
        .ui-controls { padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .tool-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        .tool-btn { background: #0f0f14; border: 1px solid rgba(255,255,255,0.1); color: #889; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 10px; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .tool-btn.active { background: var(--vertex-accent); color: #000; font-weight: 700; box-shadow: 0 0 15px var(--vertex-accent); border-color: transparent; }
        
        #actionGroup { position: absolute; right: 20px; top: 20px; display: flex; gap: 8px; pointer-events: auto; }
        .action-btn { padding: 10px 15px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; font-size: 11px; transition: 0.2s; }
        .btn-save { background: var(--vertex-accent); color: #000; }
        .btn-clear { background: #2f3542; color: #fff; }

        /* --- CATALOG & CHAT --- */
        .sidebar { position: fixed; left: 0; top: 0; width: 280px; height: 100%; background: var(--sidebar-bg); z-index: 4000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(-100%); display: flex; flex-direction: column; box-shadow: 20px 0 50px rgba(0,0,0,0.3); }
        .sidebar.active { transform: translateX(0); }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3999; display: none; backdrop-filter: blur(4px); }
        .sidebar-overlay.active { display: block; }
        .member-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 12px; margin: 0 10px 8px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
        .member-avatar { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--vertex-accent); object-fit: cover; }

        .app-container { display: flex; width: 100vw; height: 100dvh; flex-direction: column; }
        header { padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #ddd; background: #fff; z-index: 10; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; background: rgba(255,255,255,0.4); }
        
        .msg { display: flex; gap: 10px; max-width: 85%; }
        .msg.me { align-self: flex-end; flex-direction: row-reverse; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #2f3542; flex-shrink: 0; }
        .bubble { background: #fff; padding: 12px; border: 2px solid #ddd; border-radius: 18px; border-top-left-radius: 4px; position: relative; min-width: 120px; }
        .msg.me .bubble { background: #2f3542; color: #fff; border-top-left-radius: 18px; border-top-right-radius: 4px; border: none; }

        .reaction-bar { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
        .reaction-chip { background: #f1f2f6; padding: 2px 8px; border-radius: 10px; font-size: 11px; cursor: pointer; border: 1px solid #ddd; transition: 0.2s; }
        .reaction-chip.active { background: var(--vertex-accent); border-color: #00d2df; color: #000; font-weight: bold; }
        .msg.me .reaction-chip { background: rgba(255,255,255,0.1); border-color: transparent; color: #fff; }
        .emoji-picker { display: flex; gap: 8px; margin-top: 6px; opacity: 0.2; transition: 0.3s; flex-wrap: wrap; }
        .bubble:hover .emoji-picker { opacity: 1; }
        .emoji-picker span { cursor: pointer; font-size: 1.2rem; filter: grayscale(0.5); transition: 0.2s; }
        .emoji-picker span:hover { transform: scale(1.3); filter: grayscale(0); }

        .footer { padding: 12px 15px; display: flex; align-items: center; gap: 8px; background: #2f3542; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
        .input-wrap { flex: 1; background: #fff; border-radius: 25px; display: flex; align-items: center; padding: 0 15px; }
        .input-wrap input { flex: 1; border: none; padding: 10px; outline: none; font-size: 16px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(241,242,246,0.95); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-overlay.active { display: flex; }
        
        .delete-btn { cursor: pointer; opacity: 0.4; font-size: 9px; color: #ff4757; transition: 0.3s; font-weight: bold; }
        .delete-btn:hover { opacity: 1; }
    </style>
</head>
<body>

<div id="paint-studio" class="bg-pro-dark">
    <canvas id="vertexCanvas"></canvas>
    <div class="vertex-ui">
        <div id="actionGroup">
            <button class="action-btn btn-clear" onclick="clearCanvas()">Clear</button>
            <button class="action-btn btn-save" id="v-publish-btn" onclick="publishVertexArt()">Save Art</button>
            <button class="action-btn" style="background:#ff4d4d; color:white;" onclick="toggleStudio()">Exit</button>
        </div>
        <div id="mainSidebar" class="ui-panel">
            <div class="ui-header"><span class="ui-title">VERTEX TITANIUM</span></div>
            <div class="ui-controls">
                <div class="tool-grid">
                    <button class="tool-btn active" onclick="setBrush('ink', this)">Ink</button>
                    <button class="tool-btn" onclick="setBrush('neon', this)">Neon</button>
                    <button class="tool-btn" onclick="setBrush('glitch', this)">Glitch</button>
                    <button class="tool-btn" onclick="setBrush('eraser', this)">Eraser</button>
                </div>
                <input type="color" id="v-color" value="#00f2ff" style="width:100%; height:40px; border-radius:8px; border:none; background:none; cursor:pointer;">
                <input type="range" id="v-size" min="2" max="100" value="12" style="width:100%; accent-color: var(--vertex-accent);">
            </div>
        </div>
    </div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleMenu()"></div>
<aside class="sidebar" id="sidebar">
    <div style="padding:25px; color:white;">
        <h2 style="font-family:'Dancing Script'; color:var(--vertex-accent); font-size:2rem;">Artists Catalog</h2>
    </div>
    <div id="member-list" style="overflow-y:auto; flex:1;"></div>
</aside>

<div class="app-container">
    <header>
        <button onclick="toggleMenu()" style="background:#2f3542; color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold;">Catalog</button>
        <span style="font-family:'Dancing Script'; font-size:1.8rem;">Elite Gallery</span>
        <div style="width:70px;"></div>
    </header>

    <div id="chat-box"></div>

    <div class="footer">
        <img id="footer-acc-img" class="avatar" style="cursor:pointer; border-color:white; background:#eee;" onclick="openProfile()">
        <button onclick="toggleStudio()" style="background:var(--paint-accent); color:white; border:none; padding:10px 8px; border-radius:10px; font-weight:900; font-size:10px;">🎨 PAINT</button>
        <button onclick="window.location.href='index2.html'" style="background:var(--game-accent); color:white; border:none; padding:10px 8px; border-radius:10px; font-weight:900; font-size:10px;">🎮 GAME</button>
        <div class="input-wrap">
            <input type="text" id="msg-input" placeholder="Say something..." onkeypress="if(event.key==='Enter') sendMsg()">
            <button onclick="sendMsg()" style="background:none; border:none; font-size:1.2rem; cursor:pointer;">➤</button>
        </div>
    </div>
</div>

<div id="profile-modal" class="modal-overlay">
    <div style="background:white; padding:40px; border-radius:20px; text-align:center; width:90%; max-width:350px;">
        <h2 style="font-family:'Dancing Script'; margin-bottom:20px;">Your Identity</h2>
        <input type="text" id="p-name-input" placeholder="Artist Name" style="width:100%; padding:15px; border-radius:12px; border:1px solid #ddd; margin-bottom:20px;">
        <button class="action-btn" style="background:#2f3542; color:white; width:100%; padding:15px;" onclick="saveProfile()">Save Identity</button>
    </div>
</div>

<script>
    const supabaseUrl = 'https://zybglglnszurtdsisvil.supabase.co';
    const supabaseKey = 'sb_publishable_ur42hv6jPnAzsMcPAYVL1A_v2UKB2CA';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let me = JSON.parse(localStorage.getItem('elite_v14_user')) || null;
    
    // --- PAINT ENGINE ---
    let painting = false;
    const vCanvas = document.getElementById('vertexCanvas');
    const vCtx = vCanvas.getContext('2d');
    let currentBrush = 'ink';
    let points = [];

    function initVertex() {
        vCanvas.width = window.innerWidth;
        vCanvas.height = window.innerHeight;
        vCtx.lineCap = 'round';
        vCtx.lineJoin = 'round';
    }

    function toggleStudio() {
        const studio = document.getElementById('paint-studio');
        studio.classList.toggle('active');
        if(studio.classList.contains('active')) initVertex();
    }

    function clearCanvas() {
        if(confirm("Clear and start over?")) vCtx.clearRect(0, 0, vCanvas.width, vCanvas.height);
    }

    function setBrush(b, btn) { 
        currentBrush = b; 
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    vCanvas.addEventListener('pointerdown', e => {
        painting = true;
        points = [{ x: e.clientX, y: e.clientY }];
    });

    vCanvas.addEventListener('pointermove', e => {
        if (!painting) return;
        const color = document.getElementById('v-color').value;
        const size = parseInt(document.getElementById('v-size').value);
        vCtx.beginPath();
        vCtx.moveTo(points[points.length-1].x, points[points.length-1].y);
        vCtx.globalCompositeOperation = (currentBrush === 'eraser') ? 'destination-out' : 'source-over';
        
        if (currentBrush === 'neon') {
            vCtx.shadowBlur = 18; vCtx.shadowColor = color;
            vCtx.strokeStyle = '#fff'; vCtx.lineWidth = size / 2;
        } else if (currentBrush === 'glitch') {
            vCtx.shadowBlur = 0; vCtx.strokeStyle = color; vCtx.lineWidth = size;
            if (Math.random() > 0.8) vCtx.lineTo(e.clientX + 20, e.clientY);
        } else {
            vCtx.shadowBlur = 0; vCtx.strokeStyle = color; vCtx.lineWidth = size;
        }
        vCtx.lineTo(e.clientX, e.clientY);
        vCtx.stroke();
        points.push({ x: e.clientX, y: e.clientY });
    });

    window.addEventListener('pointerup', () => { painting = false; vCtx.globalCompositeOperation = 'source-over'; });

    async function publishVertexArt() {
        const btn = document.getElementById('v-publish-btn');
        btn.innerText = "Saving...";
        const blob = await new Promise(res => vCanvas.toBlob(res, 'image/png'));
        const path = `art/${me.id}-${Date.now()}.png`;
        await _supabase.storage.from('chat-photos').upload(path, blob);
        const { data } = _supabase.storage.from('chat-photos').getPublicUrl(path);
        await _supabase.from('messages').insert([{ 
            content: `<img src="${data.publicUrl}" style="width:100%; border-radius:10px;">`, 
            user_id: me.id, user_name: me.username, avatar_url: me.avatar 
        }]);
        btn.innerText = "Save Art";
        toggleStudio();
    }

    // --- CORE LOGIC ---
    function init() { if (!me) openProfile(); else { refreshUI(); startChat(); } }

    async function saveProfile() {
        const name = document.getElementById('p-name-input').value.trim();
        if(!name) return;
        
        // Persist existing ID or create one if fresh
        me = me || { id: crypto.randomUUID() };
        me.username = name;
        // Generate dynamic avatar based on name seed
        me.avatar = `https://api.dicebear.com/7.x/avataaars-neutral/svg?seed=${name}`;
        
        localStorage.setItem('elite_v14_user', JSON.stringify(me));
        
        // Upsert to Supabase profiles table
        await _supabase.from('profiles').upsert({ id: me.id, username: me.username, avatar_url: me.avatar });
        
        closeProfile(); 
        refreshUI(); 
        startChat();
    }

    function refreshUI() { 
        if(me) document.getElementById('footer-acc-img').src = me.avatar; 
    }

    function startChat() {
        loadMessages(); loadCatalog();
        _supabase.channel('room1')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMessages)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'reactions' }, loadMessages)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, loadCatalog)
            .subscribe();
    }

    async function loadCatalog() {
        const { data } = await _supabase.from('profiles').select('*').order('username');
        document.getElementById('member-list').innerHTML = (data || []).map(p => `
            <div class="member-item">
                <img src="${p.avatar_url}" class="member-avatar">
                <span style="color:white; font-size:13px; font-weight:700;">${p.username}</span>
            </div>
        `).join('');
    }

    async function loadMessages() {
        const { data } = await _supabase.from('messages').select('*, profiles(username, avatar_url), reactions(*)').order('created_at');
        if(!data) return;
        const box = document.getElementById('chat-box');
        box.innerHTML = data.map(m => {
            const isMe = m.user_id === me?.id;
            const reacts = (m.reactions || []).reduce((acc, r) => {
                acc[r.emoji] = (acc[r.emoji] || 0) + 1;
                if(r.user_id === me?.id) { acc.myReacts = acc.myReacts || {}; acc.myReacts[r.emoji] = true; }
                return acc;
            }, {myReacts: {}});
            const reactHtml = Object.entries(reacts).filter(([k]) => k !== 'myReacts').map(([emoji, count]) => `
                <div class="reaction-chip ${reacts.myReacts[emoji] ? 'active' : ''}" onclick="toggleReaction('${m.id}', '${emoji}')">${emoji} ${count}</div>
            `).join('');

            const deleteBtn = isMe ? `<span class="delete-btn" onclick="deleteMsg('${m.id}')">[DELETE]</span>` : '';

            return `
                <div class="msg ${isMe ? 'me' : ''}">
                    <img src="${m.profiles?.avatar_url || m.avatar_url}" class="avatar">
                    <div class="bubble">
                        <div style="font-size:10px; font-weight:900; color:var(--paint-accent); margin-bottom:4px; display:flex; justify-content:space-between; align-items:center;">
                            <span>${m.profiles?.username || m.user_name}</span>
                            ${deleteBtn}
                        </div>
                        <div>${m.content}</div>
                        <div class="reaction-bar">${reactHtml}</div>
                        <div class="emoji-picker">
                            <span onclick="toggleReaction('${m.id}', '👍')">👍</span>
                            <span onclick="toggleReaction('${m.id}', '👎')">👎</span>
                            <span onclick="toggleReaction('${m.id}', '❤️')">❤️</span>
                            <span onclick="toggleReaction('${m.id}', '😢')">😢</span>
                            <span onclick="toggleReaction('${m.id}', '😂')">😂</span>
                            <span onclick="toggleReaction('${m.id}', '😡')">😡</span>
                        </div>
                    </div>
                </div>`;
        }).join('');
        box.scrollTop = box.scrollHeight;
    }

    async function deleteMsg(id) {
        if(!confirm("Erase this masterpiece?")) return;
        await _supabase.from('messages').delete().eq('id', id).eq('user_id', me.id);
    }

    async function toggleReaction(mid, emoji) {
        if(!me) return;
        const { data } = await _supabase.from('reactions').select('id').eq('message_id', mid).eq('user_id', me.id).eq('emoji', emoji).maybeSingle();
        if(data) await _supabase.from('reactions').delete().eq('id', data.id);
        else await _supabase.from('reactions').insert([{ message_id: mid, user_id: me.id, emoji: emoji }]);
    }

    async function sendMsg(overrideContent = null) {
        if(!me) return;
        const input = document.getElementById('msg-input');
        const content = overrideContent || input.value.trim();
        if(!content) return;
        await _supabase.from('messages').insert([{ content: content, user_id: me.id, user_name: me.username, avatar_url: me.avatar }]);
        if(!overrideContent) input.value = '';
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('sidebar-overlay').classList.toggle('active'); }
    
    function openProfile() { 
        if(me) document.getElementById('p-name-input').value = me.username;
        document.getElementById('profile-modal').classList.add('active'); 
    }
    
    function closeProfile() { document.getElementById('profile-modal').classList.remove('active'); }

    init();
</script>
</body>
</html>
