<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Talha - Crossy Road Game Clone</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg" />

    <style>
      /* This ensures your buttons stay at the top and are clickable over the game */
      header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 60px;
        background: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        box-sizing: border-box;
        z-index: 9999; /* Higher than Three.js canvas */
        border-bottom: 2px solid #ddd;
      }

      .btn-nav {
        padding: 8px 16px;
        border-radius: 5px;
        border: none;
        font-weight: bold;
        cursor: pointer;
        text-decoration: none;
        font-family: sans-serif;
      }

      .btn-back {
        background: #2f3542;
        color: white;
      }

      .btn-next {
        background: #ffa502;
        color: white;
      }

      /* Push the game counter down so it doesn't hide under your new buttons */
      #counter {
        top: 70px !important;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <header>
      <button class="btn-nav btn-back" onclick="window.history.back()">Back</button>
      <span style="font-family: sans-serif; font-weight: bold;">Elite Gallery</span>
      <button class="btn-nav btn-next" onclick="window.location.href='index3.html'">🎮 NEXT GAME</button>
    </header>

    <div id="counter">0</div>

    <div id="controlls">
      <div>
        <button id="forward">
          <svg width="30" height="30" viewBox="0 0 10 10">
            <g transform="rotate(0, 5,5)">
              <path d="M5,4 L7,6 L3,6 L5,4" />
            </g>
          </svg>
        </button>
        <button id="left">
          <svg width="30" height="30" viewBox="0 0 10 10">
            <g transform="rotate(-90, 5,5)">
              <path d="M5,4 L7,6 L3,6 L5,4" />
            </g>
          </svg>
        </button>
        <button id="backward">
          <svg width="30" height="30" viewBox="0 0 10 10">
            <g transform="rotate(180, 5,5)">
              <path d="M5,4 L7,6 L3,6 L5,4" />
            </g>
          </svg>
        </button>
        <button id="right">
          <svg width="30" height="30" viewBox="0 0 10 10">
            <g transform="rotate(90, 5,5)">
              <path d="M5,4 L7,6 L3,6 L5,4" />
            </g>
          </svg>
        </button>
      </div>
    </div>

    <div id="end">
      <button id="retry">Retry</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/99/three.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
