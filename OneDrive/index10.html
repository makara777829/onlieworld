<!DOCTYPE html>
<html>
<head>
    <title>Super Car Drive Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

        body {
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: #000;
            font-family: 'Orbitron', sans-serif;
            user-select: none;
        }

        /* Portrait to Landscape Force */
        #mainContainer {
            position: absolute;
            top: 0; left: 0;
            transform-origin: 0% 0%;
            width: 100%; height: 100%;
            display: none;
            overflow: hidden;
        }

        #city {
            position: absolute;
            top: 0; left: 0;
            height: 35%; width: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.8) contrast(1.2);
        }

        #myCanvas {
            background: transparent;
            z-index: 100;
        }

        .aImg { display: none; }

        /* HUD Styles */
        #scoreDiv {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            border: 2px solid #00f2fe;
            padding: 10px 40px 10px 15px;
            border-radius: 10px;
            font-size: 24px;
            z-index: 2000;
            box-shadow: 0 0 15px #00f2fe;
        }

        #cn {
            height: 40px; width: 40px;
            position: absolute;
            right: -10px; top: -5px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin { 100% { transform: rotateY(360deg); } }

        /* UI Screens */
        .gameHome {
            position: absolute;
            top: 0; left: 0;
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            height: 100%; width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 3000;
        }

        #gameTitle {
            font-size: 50px;
            text-shadow: 0 0 20px #00f2fe;
            margin-bottom: 20px;
            text-align: center;
        }

        #playBtn {
            font-size: 28px;
            background: #e94560;
            color: #fff;
            padding: 15px 50px;
            border: none;
            border-radius: 50px;
            box-shadow: 0 5px #9e1a32;
            cursor: pointer;
            transition: 0.2s;
        }

        #playBtn:active {
            transform: translateY(4px);
            box-shadow: 0 1px #9e1a32;
        }

        #loading {
            width: 50px; height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top-color: #00f2fe;
            border-radius: 50%;
            animation: rotate 1s linear infinite;
            margin-top: 20px;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .controls-hint {
            margin-top: 30px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body onload="done()">

    <div id="scoreDiv">
        Score: <span id="score">0</span>
        <img src="https://image.ibb.co/jRAp0y/coin.png" id="cn">
    </div>

    <div class="gameHome" id="startPage">
        <div id="gameTitle">SUPER CAR DRIVE</div>
        <button onclick="startGame()" id="playBtn">LOADING...</button>
        <div id="loading"></div>
        <div class="controls-hint">Tap Left/Right side to Steer</div>
    </div>

    <div id="mainContainer">
        <img id="city" src="https://image.ibb.co/jCGU0y/cty.jpg">
        <canvas id="myCanvas"></canvas>
    </div>

    <img class="aImg" id="t1" src="https://image.ibb.co/dZi5Ly/t1.png">
    <img class="aImg" id="t2" src="https://image.ibb.co/jajjDJ/t2.png">
    <img class="aImg" id="t3" src="https://image.ibb.co/it4jDJ/t5.png">
    <img class="aImg" id="t4" src="https://image.ibb.co/ksy0nd/t4.png">
    <img class="aImg" id="c1" src="https://image.ibb.co/f4v7YJ/c2.png">

    <script>
        "use strict";
        let w, h, ctx, canvas;
        let loaded = false;
        let gameActive = false;
        let interval;

        function done() {
            document.getElementById("loading").style.display = "none";
            document.getElementById("playBtn").innerHTML = "START RACE";
            loaded = true;
        }

        // Handle Screen Sizing
        function resize() {
            w = window.innerWidth;
            h = window.innerHeight;
            
            // Force landscape logic for internal calculations
            if (h > w) {
                let temp = w; w = h; h = temp;
                document.getElementById("mainContainer").style.transform = `translateX(${h}px) rotate(90deg)`;
            } else {
                document.getElementById("mainContainer").style.transform = "none";
            }
            
            canvas = document.getElementById("myCanvas");
            canvas.width = w;
            canvas.height = h;
            ctx = canvas.getContext("2d");
        }

        window.addEventListener("resize", resize);
        resize();

        function startGame() {
            if (!loaded) return;
            document.getElementById("startPage").style.display = "none";
            document.getElementById("mainContainer").style.display = "block";
            gameActive = true;
            loadGame();
        }

        function loadGame() {
            const roadTop = h * 0.35;
            const roadHeight = h * 0.65;
            let score = 0;
            const scoreDisplay = document.getElementById("score");
            
            // Car state
            let carW = w * 0.18;
            let carH = carW * 0.6;
            let playerX = (w - carW) / 2;
            let steerLeft = false, steerRight = false;

            // Obstacles & Objects
            let trees = [];
            let obstacles = [];
            let coins = [];
            let frame = 0;

            class Tree {
                constructor(side) {
                    this.side = side; // -1 for left, 1 for right
                    this.y = roadTop;
                    this.z = 0; // Depth 0 to 1
                    this.img = document.getElementById("t" + (Math.floor(Math.random()*4)+1));
                }
                update(speed) {
                    this.z += speed;
                    if (this.z > 1) {
                        this.z = 0;
                        this.img = document.getElementById("t" + (Math.floor(Math.random()*4)+1));
                    }
                }
                draw() {
                    let size = 20 + (this.z * 150);
                    let x = (this.side === -1) ? (w*0.4 * (1-this.z)) - size : (w*0.6 + (w*0.4 * this.z));
                    let y = roadTop + (this.z * roadHeight);
                    ctx.drawImage(this.img, x, y - size, size, size);
                }
            }

            class Obstacle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.z = 0;
                    this.lane = Math.random() * 2 - 1; // -1 to 1
                    this.img = document.getElementById("c1");
                }
                update(speed) {
                    this.z += speed;
                    if (this.z > 1.2) this.reset();
                }
                draw() {
                    let sizeW = 20 + (this.z * carW);
                    let sizeH = sizeW * 0.6;
                    let x = (w/2) + (this.lane * w * 0.4 * this.z) - (sizeW/2);
                    let y = roadTop + (this.z * roadHeight);
                    
                    ctx.drawImage(this.img, x, y - sizeH, sizeW, sizeH);

                    // Collision detection
                    if (this.z > 0.8 && this.z < 1.0) {
                        let playerCenter = playerX + carW/2;
                        let obsCenter = x + sizeW/2;
                        if (Math.abs(playerCenter - obsCenter) < carW/1.5) {
                            gameOver();
                        }
                    }
                }
            }

            // Init items
            for(let i=0; i<5; i++) trees.push(new Tree(i % 2 === 0 ? -1 : 1));
            let enemy = new Obstacle();

            // Input handlers
            const startSteer = (e) => {
                let touchX = e.touches ? e.touches[0].clientX : e.clientX;
                // Since we might be rotated, logic depends on width
                if (touchX < window.innerWidth/2) steerRight = true; 
                else steerLeft = true;
            };
            const stopSteer = () => { steerLeft = steerRight = false; };

            window.addEventListener("touchstart", startSteer);
            window.addEventListener("touchend", stopSteer);
            window.addEventListener("mousedown", startSteer);
            window.addEventListener("mouseup", stopSteer);

            function gameOver() {
                gameActive = false;
                clearInterval(interval);
                alert("CRASHED! Score: " + score);
                location.reload(); 
            }

            interval = setInterval(() => {
                ctx.clearRect(0, 0, w, h);

                // Draw Road (3D Perspective Trapezoid)
                ctx.fillStyle = "#333";
                ctx.beginPath();
                ctx.moveTo(w * 0.45, roadTop);
                ctx.lineTo(w * 0.55, roadTop);
                ctx.lineTo(w, h);
                ctx.lineTo(0, h);
                ctx.fill();

                // Road Lines
                ctx.strokeStyle = "#fff";
                ctx.setLineDash([20, 20]);
                ctx.lineDashOffset = -frame * 5;
                ctx.beginPath();
                ctx.moveTo(w*0.5, roadTop);
                ctx.lineTo(w*0.5, h);
                ctx.stroke();

                // Update & Draw Trees
                trees.forEach(t => { t.update(0.02); t.draw(); });

                // Update & Draw Enemy
                enemy.update(0.03);
                enemy.draw();

                // Player Movement
                if (steerLeft && playerX < w - carW) playerX += 8;
                if (steerRight && playerX > 0) playerX -= 8;

                // Draw Player Car
                ctx.shadowBlur = 15;
                ctx.shadowColor = "red";
                ctx.drawImage(document.getElementById("c1"), playerX, h - carH - 10, carW, carH);
                ctx.shadowBlur = 0;

                // Score
                frame++;
                if (frame % 10 === 0) {
                    score++;
                    scoreDisplay.innerText = score;
                }

            }, 1000/60);
        }
    </script>
</body>
</html>
