<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird Pro | Elite Gallery</title>
    <link href="https://fonts.googleapis.com/css?family=Pacifico" rel="stylesheet">
    <style>
        /* --- LAYOUT STYLES --- */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #1a1a1a;
            font-family: 'Pacifico', cursive;
            overflow: hidden;
        }

        /* Fixed Header */
        header {
            width: 100%;
            height: 60px;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #ffffff;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            box-sizing: border-box;
            border-bottom: 3px solid #ddd;
        }

        .gallery-title {
            font-size: 1.4rem;
            color: #2f3542;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        #game-container {
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 6px solid #fff;
            border-radius: 12px;
            margin-top: 40px;
        }

        canvas {
            display: block;
            background: url('https://s2js.com/img/etc/flappyback.png'); /* Secure HTTPS Link */
            background-size: cover;
        }
    </style>
</head>
<body>

    <header>
        <button onclick="window.location.href='index2.html'" style="background:#2f3542; color:white; border:none; padding:8px 15px; border-radius:8px; font-weight:bold; cursor:pointer; font-size: 10px;">BACK</button>
        
        <span class="gallery-title">Elite Gallery</span>
        
        </header>

    <div id="game-container">
        <canvas id="myCanvas" width="600" height="480"></canvas>
    </div>

    <script>
        /* --- GAME LOGIC --- */
        const canvas = document.getElementById("myCanvas");
        const ctx = canvas.getContext("2d");

        const GRAVITY = 0.5;
        const JUMP = -8;
        const PIPE_SPEED = 3.5;
        const PIPE_SPAWN_RATE = 100;

        let bird, pipes, score, gameMode, frameCount;

        // Secure HTTPS image links
        const birdImg = new Image();
        birdImg.src = "https://s2js.com/img/etc/flappybird.png";
        const pipeImg = new Image();
        pipeImg.src = "https://s2js.com/img/etc/flappypipe.png";

        class Bird {
            constructor() {
                this.x = 100;
                this.y = canvas.height / 2;
                this.w = 34;
                this.h = 24;
                this.velocity = 0;
                this.angle = 0;
            }
            update() {
                if (gameMode === "running") {
                    this.velocity += GRAVITY;
                    this.y += this.velocity;
                    this.angle = Math.min(Math.PI / 3, Math.max(-Math.PI / 6, this.velocity * 0.1));
                }
                if (this.y + this.h > canvas.height || this.y < 0) gameMode = "over";
            }
            draw() {
                ctx.save();
                ctx.translate(this.x + this.w / 2, this.y + this.h / 2);
                ctx.rotate(this.angle);
                ctx.drawImage(birdImg, -this.w / 2, -this.h / 2, this.w, this.h);
                ctx.restore();
            }
        }

        class Pipe {
            constructor(x) {
                this.x = x;
                this.width = 52;
                this.gap = 150;
                this.topHeight = Math.random() * (canvas.height - 250) + 50;
                this.passed = false;
            }
            update() { this.x -= PIPE_SPEED; }
            draw() {
                ctx.save();
                ctx.translate(this.x + this.width / 2, this.topHeight / 2);
                ctx.scale(1, -1);
                ctx.drawImage(pipeImg, -this.width / 2, -this.topHeight / 2, this.width, this.topHeight);
                ctx.restore();
                ctx.drawImage(pipeImg, this.x, this.topHeight + this.gap, this.width, canvas.height);
            }
        }

        function init() {
            bird = new Bird();
            pipes = [];
            score = 0;
            frameCount = 0;
            gameMode = "prestart";
        }

        function update() {
            bird.update();
            if (gameMode === "running") {
                frameCount++;
                if (frameCount % PIPE_SPAWN_RATE === 0) pipes.push(new Pipe(canvas.width));
                for (let i = pipes.length - 1; i >= 0; i--) {
                    pipes[i].update();
                    if (bird.x + bird.w - 5 > pipes[i].x && bird.x + 5 < pipes[i].x + pipes[i].width) {
                        if (bird.y + 5 < pipes[i].topHeight || bird.y + bird.h - 5 > pipes[i].topHeight + pipes[i].gap) {
                            gameMode = "over";
                        }
                    }
                    if (!pipes[i].passed && pipes[i].x < bird.x) {
                        score++;
                        pipes[i].passed = true;
                    }
                    if (pipes[i].x + pipes[i].width < 0) pipes.splice(i, 1);
                }
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pipes.forEach(p => p.draw());
            bird.draw();
            ctx.fillStyle = "white";
            ctx.strokeStyle = "black";
            ctx.lineWidth = 4;
            ctx.textAlign = "center";

            if (gameMode === "prestart") {
                ctx.font = "30px Pacifico";
                ctx.strokeText("Click to Start", canvas.width / 2, canvas.height / 2);
                ctx.fillText("Click to Start", canvas.width / 2, canvas.height / 2);
            } else if (gameMode === "over") {
                ctx.font = "40px Pacifico";
                ctx.strokeText("Game Over", canvas.width / 2, 200);
                ctx.fillText("Game Over", canvas.width / 2, 200);
                ctx.font = "25px Pacifico";
                ctx.fillText(`Score: ${score}`, canvas.width / 2, 250);
            } else {
                ctx.font = "40px Pacifico";
                ctx.strokeText(score, canvas.width / 2, 70);
                ctx.fillText(score, canvas.width / 2, 70);
            }
        }

        function gameLoop() {
            update();
            render();
            requestAnimationFrame(gameLoop);
        }

        function handleInput() {
            if (gameMode === "prestart") gameMode = "running";
            if (gameMode === "running") bird.velocity = JUMP;
            if (gameMode === "over") init();
        }

        window.addEventListener("mousedown", handleInput);
        window.addEventListener("keydown", (e) => { if(e.code === "Space") handleInput(); });
        window.addEventListener("touchstart", (e) => { e.preventDefault(); handleInput(); });

        init();
        gameLoop();
    </script>
</body>
</html>
